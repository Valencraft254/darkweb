  background: white;
}

/* Navbar */
.navbar {
  background: #fff;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.menu {
  width: 30px;
  cursor: pointer;
}

.menu div {
  height: 4px;
  background: black;
  margin: 5px 0;
}

/* Header */
.header {
  text-align: center;
  padding: 20px;
}

.logo {
  max-width: 200px;
}

/* Products */
.products {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
}

.product {
  border: 1px solid #ddd;
  padding: 15px;
  text-align: center;
  width: 200px;
}

.product img {
  width: 100%;
}

/* Botón */
.buy {
  background: green;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #ddd;
  margin-top: 40px;
}
</style>

<script>
function comprar() {

<div class="navbar">

  </div>
</div>

<!-- Logo -->
<div class="header">
  <img src="logo.png" alt="logo" class="logo">
</div>

<!-- Productos -->
<div class="products">

  <div class="product">
    <img src="tanque.png" alt="tanque">
    <h3>Tanque de guerra</h3>
    <p>10000000000 ARS</p>
